name: Bug report
description: Report a reproducible winTerm problem without sensitive terminal data.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include passwords, tokens, private terminal output, commands, proprietary source code, memory dumps, or confidential Workspace files.
  - type: input
    id: version
    attributes:
      label: winTerm version
      placeholder: 1.0.2 or exact commit
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Installation type
      options:
        - Public MSIX
        - Draft MSIX
        - Development build
        - Other
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - x64
        - ARM64
        - Unknown
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Windows and Shell versions
      description: Include edition and build only; redact user and machine names.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Replace private commands, paths, and data with safe examples.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      options:
        - Always
        - Often
        - Once
        - Unknown
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Reviewed diagnostic bundle or screenshots
      description: Attach only a user-generated, reviewed, redacted bundle.
