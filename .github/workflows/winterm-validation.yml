name: winTerm validation

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Static and smoke validation
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Validate appearance assets and licenses
        shell: powershell
        run: .\scripts\winterm\validate-assets.ps1

      - name: Verify generated third-party notices
        shell: powershell
        run: .\scripts\winterm\generate-third-party-notices.ps1 -Check

      - name: Verify winTerm identity, scripts, and profile foundations
        shell: powershell
        run: .\scripts\winterm\test.ps1 -Suite Smoke

      - name: Validate Shell Experience assets and safety boundaries
        shell: powershell
        run: |
          .\scripts\winterm\package-shell-assets.ps1
          .\scripts\winterm\test-paste-protection.ps1

      - name: Test PowerShell and Command Prompt integration
        shell: powershell
        run: .\scripts\winterm\test-shell-integration.ps1 -Shell All

      - name: Validate workspace fixtures, restore, recovery, and import security
        shell: powershell
        run: |
          .\scripts\winterm\test-workspace-model.ps1
          .\scripts\winterm\test-workspace-restore.ps1
          .\scripts\winterm\test-workspace-recovery.ps1
          .\scripts\winterm\test-workspace-import.ps1
