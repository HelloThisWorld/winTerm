name: winTerm full Windows build

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: x64 ${{ matrix.configuration }} build and relevant tests
    runs-on: windows-2022
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Validate appearance assets and licenses
        shell: pwsh
        run: .\scripts\winterm\validate-assets.ps1

      - name: Verify generated third-party notices
        shell: pwsh
        run: .\scripts\winterm\generate-third-party-notices.ps1 -Check

      - name: Run static and smoke validation
        shell: pwsh
        run: .\scripts\winterm\test.ps1 -Suite Smoke -Configuration ${{ matrix.configuration }} -Platform x64

      - name: Test Shell Experience assets
        shell: pwsh
        run: .\scripts\winterm\test-shell-integration.ps1 -Shell All

      - name: Validate workspace fixtures and security boundaries
        shell: pwsh
        run: .\scripts\winterm\validate-workspaces.ps1 -BundledFixtures

      - name: Build x64
        shell: pwsh
        env:
          WINTERM_MSBUILD_DIAGNOSTIC: ${{ matrix.configuration == 'Release' && '1' || '0' }}
        run: .\scripts\winterm\build.ps1 -Configuration ${{ matrix.configuration }} -Platform x64 -IncludeTests

      - name: Summarize XAML compiler diagnostics
        if: failure() && matrix.configuration == 'Release'
        shell: pwsh
        run: |
          $logPath = Join-Path $PWD 'winterm-msbuild-diag.log'
          if (-not (Test-Path -LiteralPath $logPath)) {
            Write-Warning 'The MSBuild diagnostic log was not produced.'
            exit 0
          }

          $context = [System.Collections.Generic.Queue[string]]::new()
          $found = $false
          foreach ($line in [System.IO.File]::ReadLines($logPath)) {
            $clipped = if ($line.Length -gt 4000) {
              $line.Substring(0, 1900) + " ... [$($line.Length - 3800) characters omitted] ... " + $line.Substring($line.Length - 1900)
            } else {
              $line
            }
            $context.Enqueue($clipped)
            while ($context.Count -gt 1200) {
              $null = $context.Dequeue()
            }
            if ($line -match 'WMC9999: Illegal characters in path') {
              $found = $true
              break
            }
          }

          if (-not $found) {
            Write-Warning 'The expected XAML compiler error was not found in the diagnostic log.'
            exit 0
          }

          $lines = @($context)
          $start = [Math]::Max(0, $lines.Count - 400)
          for ($index = 0; $index -lt $lines.Count; $index++) {
            if ($lines[$index] -match 'Task "CompileXaml"') {
              $start = $index
            }
          }
          $lines[$start..($lines.Count - 1)] | Write-Host

      - name: Run relevant upstream tests
        shell: pwsh
        run: .\scripts\winterm\test.ps1 -Suite Relevant -Configuration ${{ matrix.configuration }} -Platform x64

      - name: Run workspace benchmark
        shell: pwsh
        run: .\scripts\winterm\benchmark-workspace.ps1

  package:
    name: x64 Release MSIX
    needs: build-and-test
    runs-on: windows-2022
    timeout-minutes: 180

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Build and verify unsigned development package
        shell: pwsh
        run: .\scripts\winterm\package.ps1 -Platform x64

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: winTerm-x64-Release-unsigned
          path: src/cascadia/CascadiaPackage/AppPackages/**/*.msix
          if-no-files-found: error
