name: winTerm full Windows build

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: x64 ${{ matrix.configuration }} build and relevant tests
    runs-on: windows-2022
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate appearance assets and licenses
        shell: pwsh
        run: .\scripts\winterm\validate-assets.ps1

      - name: Verify generated third-party notices
        shell: pwsh
        run: .\scripts\winterm\generate-third-party-notices.ps1 -Check

      - name: Run static and smoke validation
        shell: pwsh
        run: .\scripts\winterm\test.ps1 -Suite Smoke -Configuration ${{ matrix.configuration }} -Platform x64

      - name: Test Shell Experience assets
        shell: pwsh
        run: .\scripts\winterm\test-shell-integration.ps1 -Shell All

      - name: Validate workspace fixtures and security boundaries
        shell: pwsh
        run: .\scripts\winterm\validate-workspaces.ps1 -BundledFixtures

      - name: Validate docking source and local UI boundaries
        shell: pwsh
        run: |
          .\scripts\winterm\test-layout-transformations.ps1
          .\scripts\winterm\test-docking-transactions.ps1
          .\scripts\winterm\test-session-transfer.ps1
          .\scripts\winterm\test-layout-history.ps1
          .\scripts\winterm\test-docking-presentation.ps1
          .\scripts\winterm\test-docking-ui.ps1 -Mode Validate
          .\scripts\winterm\validate-layout.ps1 -TestFixture empty-slot.winterm-workspace.json

      - name: Build x64
        shell: pwsh
        run: .\scripts\winterm\build.ps1 -Configuration ${{ matrix.configuration }} -Platform x64 -IncludeTests

      - name: Run relevant upstream tests
        shell: pwsh
        run: .\scripts\winterm\test.ps1 -Suite Relevant -Configuration ${{ matrix.configuration }} -Platform x64

      - name: Run workspace benchmark
        shell: pwsh
        run: .\scripts\winterm\benchmark-workspace.ps1

      - name: Run docking model benchmark
        shell: pwsh
        run: .\scripts\winterm\benchmark-docking.ps1

  package:
    name: x64 unpackaged distributions and installer tests
    needs: build-and-test
    runs-on: windows-2022
    timeout-minutes: 300

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve the application version
        shell: pwsh
        run: |
          $metadata = Get-Content -LiteralPath 'src\winterm\Branding\version.json' -Raw | ConvertFrom-Json
          "WINTERM_VERSION=$($metadata.applicationVersion)" >> $env:GITHUB_ENV

      - name: Install the pinned official Inno Setup compiler
        shell: pwsh
        run: |
          $download = Join-Path $env:RUNNER_TEMP 'innosetup-6.7.3.exe'
          $installRoot = Join-Path $env:RUNNER_TEMP 'Inno-Setup-6.7.3'
          Invoke-WebRequest `
            -Uri 'https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe' `
            -OutFile $download
          $hash = (Get-FileHash -LiteralPath $download -Algorithm SHA256).Hash
          if ($hash -cne '9C73C3BAE7ED48D44112A0F48E66742C00090BDB5BEF71D9D3C056C66E97B732') {
            throw "Pinned Inno Setup download hash mismatch: $hash"
          }
          $signature = Get-AuthenticodeSignature -LiteralPath $download
          if ($signature.Status -ne 'Valid' -or $signature.SignerCertificate.Subject -notmatch 'Pyrsys B\.V\.') {
            throw 'The pinned Inno Setup download does not have the expected trusted signature.'
          }
          $install = Start-Process -FilePath $download -ArgumentList @(
            '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', '/CURRENTUSER', "/DIR=`"$installRoot`"") `
            -WindowStyle Hidden -Wait -PassThru
          if ($install.ExitCode -ne 0) {
            throw "Pinned Inno Setup installation failed with exit code $($install.ExitCode)."
          }
          "WINTERM_INNO_COMPILER=$(Join-Path $installRoot 'ISCC.exe')" >> $env:GITHUB_ENV

      - name: Build and verify unpackaged, Setup, and Portable distributions
        shell: pwsh
        run: |
          .\scripts\winterm\build-unpackaged.ps1 -Configuration Release -Platform x64 -Force
          .\scripts\winterm\build-installer.ps1 `
            -Version $env:WINTERM_VERSION `
            -Platform x64 `
            -StageDirectory 'artifacts\stage\winTerm-x64' `
            -OutputDirectory 'artifacts\release' `
            -InnoCompiler $env:WINTERM_INNO_COMPILER `
            -SkipBuild
          .\scripts\winterm\build-portable.ps1 `
            -Version $env:WINTERM_VERSION `
            -Platform x64 `
            -StageDirectory 'artifacts\stage\winTerm-x64' `
            -OutputDirectory 'artifacts\release' `
            -SkipBuild

      - name: Test current-user and all-users installation lifecycles
        shell: pwsh
        run: |
          .\scripts\winterm\test-installer.ps1 `
            -InstallerPath "artifacts\release\winTerm-$env:WINTERM_VERSION-setup-x64.exe" `
            -Platform x64 `
            -Version $env:WINTERM_VERSION `
            -RunSilentRoundTrip `
            -RunAllUsersRoundTrip `
            -RunDefaultPathRoundTrips
          .\scripts\winterm\test-portable.ps1 `
            -PortablePath "artifacts\release\winTerm-$env:WINTERM_VERSION-portable-x64.zip" `
            -Platform x64 `
            -Version $env:WINTERM_VERSION `
            -RunLaunch

      - name: Upload the exact unpackaged distribution allowlist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: winTerm-${{ env.WINTERM_VERSION }}-x64-distributions
          path: |
            artifacts/release/winTerm-${{ env.WINTERM_VERSION }}-setup-x64.exe
            artifacts/release/winTerm-${{ env.WINTERM_VERSION }}-portable-x64.zip
          if-no-files-found: error
